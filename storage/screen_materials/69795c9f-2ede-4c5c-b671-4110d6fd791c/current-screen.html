<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#881d28",
                        "on-tertiary-fixed": "#400009",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#27354c",
                        "surface-dim": "#041329",
                        "outline-variant": "#3d4a3d",
                        "primary-fixed-dim": "#53e076",
                        "outline": "#869585",
                        "tertiary-fixed": "#ffdad9",
                        "on-tertiary": "#680114",
                        "on-primary-fixed-variant": "#005320",
                        "surface-container-lowest": "#010e24",
                        "secondary-fixed-dim": "#99d59d",
                        "surface-bright": "#2c3951",
                        "primary": "#53e076",
                        "error": "#ffb4ab",
                        "surface-container-low": "#0d1c32",
                        "on-primary-fixed": "#002108",
                        "on-secondary-fixed": "#002108",
                        "tertiary-container": "#ff767b",
                        "on-secondary-fixed-variant": "#195127",
                        "primary-container": "#1db954",
                        "surface-container-high": "#1c2a41",
                        "on-secondary-container": "#8cc690",
                        "background": "#041329",
                        "on-surface": "#d6e3ff",
                        "inverse-on-surface": "#233148",
                        "secondary-container": "#1c5329",
                        "on-primary": "#003914",
                        "primary-fixed": "#72fe8f",
                        "surface-tint": "#53e076",
                        "secondary": "#99d59d",
                        "surface-container": "#112036",
                        "surface": "#041329",
                        "on-background": "#d6e3ff",
                        "tertiary-fixed-dim": "#ffb3b3",
                        "inverse-primary": "#006e2d",
                        "on-primary-container": "#004118",
                        "inverse-surface": "#d6e3ff",
                        "on-error": "#690005",
                        "on-surface-variant": "#bccbb9",
                        "surface-variant": "#27354c",
                        "on-secondary": "#003914",
                        "secondary-fixed": "#b5f1b8",
                        "tertiary": "#ffb3b3",
                        "on-tertiary-container": "#730a1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            }
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #041329;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(44, 57, 81, 0.6);
            backdrop-filter: blur(40px);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary selection:text-on-primary">
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-surface-container-highest/20 blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(29,185,84,0.3)]">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="graphic_eq">graphic_eq</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tighter text-on-background mb-2">Glosify</h1>
</div>
<!-- Login Card -->
<div class="glass-effect rounded-xl p-8 md:p-12 border border-white/5 shadow-2xl">
<header class="mb-10">
<h2 class="text-2xl font-bold text-white mb-2">Welcome Back</h2>
<p class="text-slate-400 text-sm">Please enter your details to resume your journey.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 px-5 text-on-surface placeholder:text-slate-500 focus:ring-2 focus:ring-primary-container transition-all" placeholder="name@domain.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-widest text-slate-400">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-md py-4 px-5 text-on-surface placeholder:text-slate-500 focus:ring-2 focus:ring-primary-container transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container text-on-primary font-bold py-4 rounded-full hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_10px_30px_rgba(29,185,84,0.2)] flex items-center justify-center gap-2" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest">
<span class="bg-[#1e2a3f] px-4 text-slate-500 font-bold">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="space-y-4">
<button class="w-full bg-surface-container-highest hover:bg-surface-bright text-white font-semibold py-4 px-6 rounded-lg flex items-center justify-center gap-3 transition-all border border-white/5">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google logo with its characteristic multi-colored G symbol on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDb84CkxQc5AKS9GScmkzh2AEulFhQWdAoHn7_HMmWS75aW9CH9-XHHKvv2RI-e9TUSbNbWTdUEtYIPZepEBsp7ngr3ICD5zwYpYW_kDJbcj6jaZ9zTZ6x3ieByU02YwnUz3uhwHlZFgi-AIuviWgnmjLzMNZFZLy-ICCqDiua1oRwdZj2rEtyOdj34lVx7AUWI-1pMgO0cbn2q7x1kzaUaBzRRc3CnlI4tggIUet-0CHHxOw0yHggpVlm4dUiUHbRoK3NiP_M6-BeD"/>
                    Continue with Google
                </button>
</div>
<!-- Footer -->
<footer class="mt-10 text-center">
<p class="text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</footer>
</div>
<!-- Secondary Info Section (Asymmetric) -->
<div class="mt-12 grid grid-cols-2 gap-4">
</div>
<div class="mt-12 flex justify-center gap-8 opacity-40 grayscale">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Privacy Policy</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Terms of Service</span>
</div>
</main>
<!-- Visual Decoration Card (Off-screen on mobile, visible on wide screens) -->

</body></html>
